---
- name: Install nginx-stack packages
  ansible.builtin.apt:
    name:
      - mariadb-client
      - nginx
      - php8.3-cli
      - php8.3-curl
      - php8.3-fpm
      - php8.3-gd
      - php8.3-intl
      - php8.3-mbstring
      - php8.3-mysql
      - php8.3-redis
      - php8.3-xml
      - php8.3-zip
      - redis-server
    state: present

- name: Ensure nginx document root exists
  ansible.builtin.file:
    path: /srv/www/pressluft/default/public
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'

- name: Deploy nginx default landing page
  ansible.builtin.copy:
    dest: /srv/www/pressluft/default/public/index.html
    owner: www-data
    group: www-data
    mode: '0644'
    content: |
      <!doctype html>
      <html lang="en">
      <head>
        <meta charset="utf-8">
        <title>Pressluft NGINX Baseline</title>
      </head>
      <body>
        <h1>Pressluft baseline ready</h1>
        <p>The nginx-stack profile converged successfully.</p>
      </body>
      </html>

- name: Deploy managed nginx site config
  ansible.builtin.template:
    src: pressluft-default.conf.j2
    dest: /etc/nginx/sites-available/pressluft-default.conf
    mode: '0644'
  notify: restart nginx

- name: Enable managed nginx site config
  ansible.builtin.file:
    src: /etc/nginx/sites-available/pressluft-default.conf
    dest: /etc/nginx/sites-enabled/pressluft-default.conf
    state: link
  notify: restart nginx

- name: Disable distro default nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: restart nginx

- name: Ensure nginx-stack services are enabled and started
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - nginx
    - php8.3-fpm
    - redis-server
